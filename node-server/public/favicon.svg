<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glowing Accent Gradients -->
    <linearGradient id="recon-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Clear/Transparent Background (omitted rect for absolute transparency) -->

  <!-- Outer Cybernetic Hexagon Frame -->
  <polygon 
    points="256,36 446,146 446,366 256,476 66,366 66,146" 
    fill="none" 
    stroke="url(#recon-accent)" 
    stroke-width="16" 
    stroke-linejoin="round"
    filter="url(#neon-glow)"
  />

  <!-- Subtle Inner Target Reticle Lines -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#818cf8" stroke-dasharray="8 12" stroke-width="3" opacity="0.4" />
  <line x1="256" y1="50" x2="256" y2="90" stroke="#818cf8" stroke-width="4" opacity="0.6" />
  <line x1="256" y1="422" x2="256" y2="462" stroke="#818cf8" stroke-width="4" opacity="0.6" />
  <line x1="80" y1="256" x2="120" y2="256" stroke="#818cf8" stroke-width="4" opacity="0.6" />
  <line x1="392" y1="256" x2="432" y2="256" stroke="#818cf8" stroke-width="4" opacity="0.6" />

  <!-- Core Render Recon Node Structure -->
  <g transform="translate(128, 128)" filter="url(#neon-glow)">
    <!-- Central Code Bracket Left < -->
    <path d="M 50,60 L 10,128 L 50,196" fill="none" stroke="#818cf8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Central Code Bracket Right > -->
    <path d="M 206,60 L 246,128 L 206,196" fill="none" stroke="#34d399" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Central Scanned Target Node (DOM Dot) -->
    <circle cx="128" cy="128" r="28" fill="url(#recon-accent)" />
    
    <!-- Pulse Ring around central node -->
    <circle cx="128" cy="128" r="48" fill="none" stroke="#34d399" stroke-width="6" opacity="0.7" />

    <!-- Connection Paths/Branches representing DOM trees -->
    <path d="M 128,60 L 128,100" stroke="#818cf8" stroke-width="8" stroke-linecap="round" />
    <path d="M 128,156 L 128,196" stroke="#34d399" stroke-width="8" stroke-linecap="round" />
    
    <!-- Top and Bottom auxiliary node indicators -->
    <circle cx="128" cy="48" r="12" fill="#818cf8" />
    <circle cx="128" cy="208" r="12" fill="#34d399" />
  </g>
</svg>